name: Android

on:
  push:
    branches:
      - main
      - dev
    tags:
      - "**"
  workflow_dispatch:

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-dev:
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses > /dev/null
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Prepare signing and Firebase files
        shell: bash
        env:
          ANDROID_DEV_KEYSTORE_BASE64: ${{ secrets.ANDROID_DEV_KEYSTORE_BASE64 }}
          ANDROID_DEV_STORE_PASSWORD: ${{ secrets.ANDROID_DEV_STORE_PASSWORD }}
          ANDROID_DEV_KEY_ALIAS: ${{ secrets.ANDROID_DEV_KEY_ALIAS }}
          ANDROID_DEV_KEY_PASSWORD: ${{ secrets.ANDROID_DEV_KEY_PASSWORD }}
          ANDROID_GOOGLE_SERVICES_JSON: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}
        run: |
          required_vars=(
            ANDROID_DEV_KEYSTORE_BASE64
            ANDROID_DEV_STORE_PASSWORD
            ANDROID_DEV_KEY_ALIAS
            ANDROID_DEV_KEY_PASSWORD
            ANDROID_GOOGLE_SERVICES_JSON
          )
          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              echo "::error::Missing required secret: ${var_name}"
              exit 1
            fi
          done

          mkdir -p .signing
          printf '%s' "$ANDROID_DEV_KEYSTORE_BASE64" | base64 --decode > .signing/dev.keystore
          printf '%s' "$ANDROID_GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Build signed branch artifacts
        env:
          NTFY_SIGNING_PROFILE: dev
          NTFY_DEV_SIGNING_STORE_FILE: .signing/dev.keystore
          NTFY_DEV_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_DEV_STORE_PASSWORD }}
          NTFY_DEV_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_DEV_KEY_ALIAS }}
          NTFY_DEV_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_DEV_KEY_PASSWORD }}
        run: ./gradlew --stacktrace --no-daemon assembleFdroidRelease assemblePlayRelease

      - name: Upload branch artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ntfy-android-${{ github.ref_name }}-signed
          path: |
            app/build/outputs/apk/fdroid/release/*.apk
            app/build/outputs/apk/play/release/*.apk
          if-no-files-found: error

  build-release:
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses > /dev/null
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Prepare signing and Firebase files
        shell: bash
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
          ANDROID_GOOGLE_SERVICES_JSON: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}
        run: |
          required_vars=(
            ANDROID_RELEASE_KEYSTORE_BASE64
            ANDROID_RELEASE_STORE_PASSWORD
            ANDROID_RELEASE_KEY_ALIAS
            ANDROID_RELEASE_KEY_PASSWORD
            ANDROID_GOOGLE_SERVICES_JSON
          )
          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              echo "::error::Missing required secret: ${var_name}"
              exit 1
            fi
          done

          mkdir -p .signing
          printf '%s' "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > .signing/release.keystore
          printf '%s' "$ANDROID_GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Build signed release artifacts
        env:
          NTFY_SIGNING_PROFILE: release
          NTFY_RELEASE_SIGNING_STORE_FILE: .signing/release.keystore
          NTFY_RELEASE_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          NTFY_RELEASE_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          NTFY_RELEASE_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: ./gradlew --stacktrace --no-daemon assembleFdroidRelease assemblePlayRelease bundleFdroidRelease bundlePlayRelease

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ntfy-android-${{ github.ref_name }}-release
          path: |
            app/build/outputs/apk/fdroid/release/*.apk
            app/build/outputs/apk/play/release/*.apk
            app/build/outputs/bundle/fdroidRelease/*.aab
            app/build/outputs/bundle/playRelease/*.aab
          if-no-files-found: error

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            app/build/outputs/apk/fdroid/release/*.apk
            app/build/outputs/apk/play/release/*.apk
            app/build/outputs/bundle/fdroidRelease/*.aab
            app/build/outputs/bundle/playRelease/*.aab
